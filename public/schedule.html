<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AthletiCare AI | Schedule Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/schedule.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <!-- ================= TOP NAV ================= -->
    <nav class="navbar">
        <div class="nav-logo">AthletiCare<span>AI</span></div>
        <div class="nav-links">
            <a href="index.html">Chatbot</a>
            <a href="schedule.html" class="active">Scheduling</a>
            <a href="#" id="logoutBtn">Logout</a>
        </div>
        <div class="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="schedule-container">

        <!-- ================= LEFT: FORM ================= -->
        <section class="schedule-form-section">
            <div class="section-header">
                <h1>Build Your Schedule</h1>
                <p>Turn AI-recommended exercises into a structured calendar</p>
            </div>

            <form id="scheduleForm" class="schedule-form">
                <!-- Exercise Name -->
                <div class="form-group">
                    <label for="exerciseName">Exercise Name</label>
                    <input
                        type="text"
                        id="exerciseName"
                        placeholder="e.g., Ankle Circles, Knee Strengthening"
                        required
                    />
                </div>

                <!-- Duration -->
                <div class="form-group">
                    <label for="duration">Duration</label>
                    <select id="duration" required>
                        <option value="" disabled selected>Select duration</option>
                        <option value="5">5 minutes</option>
                        <option value="10">10 minutes</option>
                        <option value="15">15 minutes</option>
                        <option value="20">20 minutes</option>
                        <option value="30">30 minutes</option>
                        <option value="45">45 minutes</option>
                        <option value="60">1 hour</option>
                    </select>
                </div>

                <!-- Days of Week -->
                <div class="form-group">
                    <label>Days of Week</label>
                    <div class="days-selector">
                        <button type="button" class="day-btn" data-day="MO">Mon</button>
                        <button type="button" class="day-btn" data-day="TU">Tue</button>
                        <button type="button" class="day-btn" data-day="WE">Wed</button>
                        <button type="button" class="day-btn" data-day="TH">Thu</button>
                        <button type="button" class="day-btn" data-day="FR">Fri</button>
                        <button type="button" class="day-btn" data-day="SA">Sat</button>
                        <button type="button" class="day-btn" data-day="SU">Sun</button>
                    </div>
                    <input type="hidden" id="selectedDays" required />
                    <span class="error-message" id="daysError">Select at least one day</span>
                </div>

                <!-- Time of Day -->
                <div class="form-group">
                    <label for="timeOfDay">Time of Day</label>
                    <input
                        type="time"
                        id="timeOfDay"
                        required
                    />
                </div>

                <!-- Optional Notes -->
                <div class="form-group">
                    <label for="notes">Notes (Optional)</label>
                    <textarea
                        id="notes"
                        placeholder="e.g., 3 sets of 10 reps, Light intensity, Use resistance band"
                        rows="3"
                    ></textarea>
                </div>

                <!-- Add Exercise Button -->
                <button type="submit" class="add-exercise-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Add Exercise to Schedule
                </button>
            </form>
        </section>

        <!-- ================= RIGHT: PREVIEW ================= -->
        <section class="schedule-preview-section">
            <div class="section-header">
                <h2>Schedule Preview</h2>
                <p>Review your exercises before downloading</p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state hidden">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                </div>
                <p>No exercises added yet</p>
                <span>Add your first exercise to see it here</span>
            </div>

            <!-- Schedule List -->
            <div id="scheduleList" class="schedule-list"></div>

            <!-- Download Section -->
            <div id="downloadSection" class="download-section hidden">
                <div class="schedule-summary">
                    <span id="exerciseCount">0</span> exercises scheduled
                </div>
                <button id="downloadBtn" class="download-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    Download Schedule (.ics)
                </button>
            </div>
        </section>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="js/schedule.js" defer></script>
</body>

</html>
