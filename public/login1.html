<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>AthletiCare AI | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-logo">AthletiCare AI</div>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="login1.html" class="active">Athlete Login</a>
            <a href="trainer-login.html">Trainer Login</a>
            <a href="signup.html" class="nav-cta">Sign Up</a>
        </div>
        <div class="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">

            <header class="auth-header">
                <h1>AthletiCare AI</h1>
                <p>Secure sports injury guidance</p>
            </header>

            <form id="login-form">
                <input type="email" id="loginEmail" placeholder="Email Address" required />
                <input type="password" id="loginPassword" placeholder="Password" required />
                <input type="text" id="access-code-input" placeholder="Access Code (optional for non-school affiliated users)" />
                <button type="submit">Log In</button>
            </form>

            <p class="auth-footer">
                Don’t have an account?
                <a href="signup.html">Sign Up</a>
            </p>

            <p id="loginMessage"></p>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js" defer></script>
</body>

</html>
